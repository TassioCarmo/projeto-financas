services:
  db:
    image: postgres:16-alpine
    container_name: financas_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: financas
      POSTGRES_PASSWORD: financas
      POSTGRES_DB: financas_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financas -d financas_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
