{# Sidebar de navegação principal #}
{% set ep = request.endpoint or '' %}

<aside id="sidebar" class="sidebar" aria-label="Navegação principal">
    <div class="sidebar-brand">
        <div class="sidebar-brand-icon" aria-hidden="true">F</div>
        <span class="sidebar-brand-text">Finanças</span>
    </div>

    <nav class="sidebar-nav">
        <ul>
            <li>
                <a href="{{ url_for('transacoes.listar') }}"
                   class="sidebar-link{% if ep == 'transacoes.listar' or ep == 'transacoes.criar' or ep == 'transacoes.importar' %} ativo{% endif %}">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                    </svg>
                    Transações
                </a>
            </li>
            <li>
                <a href="{{ url_for('resumo_mensal.listar') }}"
                   class="sidebar-link{% if ep and ep.startswith('resumo_mensal') %} ativo{% endif %}">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                    Resumo mensal
                </a>
            </li>
            <li>
                <a href="{{ url_for('orcamentos.listar') }}"
                   class="sidebar-link{% if ep and ep.startswith('orcamentos') and not ep.startswith('dashboard') %} ativo{% endif %}">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/>
                    </svg>
                    Orçamentos
                </a>
            </li>
            <li>
                <a href="{{ url_for('dashboard.visao_geral') }}"
                   class="sidebar-link{% if ep and ep.startswith('dashboard') %} ativo{% endif %}">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                    </svg>
                    Dashboard
                </a>
            </li>
            <li>
                <a href="{{ url_for('consultas.listar') }}"
                   class="sidebar-link{% if ep and ep.startswith('consultas') %} ativo{% endif %}">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    Consultas
                </a>
            </li>
            <li>
                <a href="{{ url_for('perfil.exibir') }}"
                   class="sidebar-link{% if ep == 'perfil.exibir' %} ativo{% endif %}">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                    </svg>
                    Perfil
                </a>
            </li>
        </ul>
    </nav>

    <div class="sidebar-footer">
        <form method="POST" action="{{ url_for('auth.logout') }}">
            <button type="submit" class="btn btn-ghost sidebar-logout">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" aria-hidden="true">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                Sair
            </button>
        </form>
    </div>
</aside>
