{% extends "base.html" %}

{% block title %}Cadastro — Finanças{% endblock %}

{% block content %}
<h1>Cadastro</h1>
<form method="POST" action="{{ url_for('auth.cadastro') }}">
    <label for="nome">Nome</label>
    <input type="text" id="nome" name="nome" value="{{ nome or '' }}" required>

    <label for="email">Email</label>
    <input type="email" id="email" name="email" value="{{ email or '' }}" required>

    <label for="senha">Senha</label>
    <input type="password" id="senha" name="senha" required minlength="6">

    <button type="submit">Cadastrar</button>
</form>
<p class="links">Já tem conta? <a href="{{ url_for('auth.login') }}">Faça login</a></p>
{% endblock %}
