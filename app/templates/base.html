<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Finanças{% endblock %}</title>
    <style>
        body { font-family: sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        h1 { font-size: 1.5rem; }
        h2 { font-size: 1.2rem; margin-top: 2rem; }
        label { display: block; margin-top: 0.75rem; }
        input, select, textarea { width: 100%; padding: 0.5rem; margin-top: 0.25rem; box-sizing: border-box; }
        button { margin-top: 1rem; padding: 0.5rem 1rem; cursor: pointer; }
        .flash { padding: 0.75rem; margin-bottom: 1rem; border-radius: 4px; }
        .flash.sucesso { background: #d4edda; color: #155724; }
        .flash.erro { background: #f8d7da; color: #721c24; }
        .links { margin-top: 1rem; }
        .nav { display: flex; gap: 1rem; margin-bottom: 1.5rem; font-size: 0.9rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 0.9rem; }
        th, td { border: 1px solid #ddd; padding: 0.5rem; text-align: left; vertical-align: top; }
        th { background: #f5f5f5; }
        .acoes { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .acoes button { margin-top: 0; }
        .edit-row td { background: #fafafa; }
        .edit-row label { margin-top: 0.5rem; font-size: 0.85rem; }
        .hidden { display: none; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 1rem; }
        .hint { font-size: 0.85rem; color: #666; margin-top: 0.5rem; }
        .importacao-resumo { padding: 0.75rem; margin: 1rem 0; border-radius: 4px; background: #eef5ff; color: #1a3a5c; }
        .importacao-resumo table { margin-top: 0.75rem; font-size: 0.85rem; }
        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for categoria, mensagem in messages %}
                <div class="flash {{ categoria }}">{{ mensagem }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

    {% block scripts %}{% endblock %}
</body>
</html>
